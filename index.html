<!DOCTYPE html>
<html lang="ko" data-theme="paper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Good Morning — Archive</title>
<style>
:root{--bg:#f1e9d6;--paper:#f7f0dd;--ink:#1a1410;--muted:#6b5f4b;--rule:#cdbfa0;--accent:#a93425}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:system-ui,'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;display:flex;flex-direction:column;overflow:hidden}
#bar{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 14px;border-bottom:2px solid var(--ink);background:var(--paper);position:relative;z-index:2}
#bar button{font-family:inherit;background:none;border:1px solid var(--rule);color:var(--ink);cursor:pointer;font-size:16px;line-height:1;padding:5px 13px;border-radius:2px;transition:.15s}
#bar button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
#bar button:disabled{opacity:.28;cursor:default}
#date{font-weight:700;font-size:15px;letter-spacing:.02em;min-width:150px;text-align:center;font-variant-numeric:tabular-nums}
#count{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:54px}
#frame{flex:1 1 auto;width:100%;border:0;background:var(--bg)}
#msg{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;padding:20px;text-align:center}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="bar">
  <button id="prev" title="이전 날 (←)">‹</button>
  <span id="date">—</span>
  <button id="next" title="다음 날 (→)">›</button>
  <span id="count"></span>
</div>
<iframe id="frame" class="hidden" title="Good Morning"></iframe>
<div id="msg">불러오는 중…</div>

<script>
const $=s=>document.querySelector(s);
let DATES=[], idx=0;

async function loadDay(date){
  const res=await fetch('d/'+date+'.html.gz',{cache:'no-cache'});
  if(!res.ok) throw new Error('missing');
  const buf=new Uint8Array(await res.arrayBuffer());
  // gzip magic 1f 8b -> decompress in-browser; otherwise the server already decoded it.
  if(buf[0]===0x1f && buf[1]===0x8b){
    const stream=new Blob([buf]).stream().pipeThrough(new DecompressionStream('gzip'));
    return await new Response(stream).text();
  }
  return new TextDecoder().decode(buf);
}
function fmtDate(d){
  const [y,m,da]=d.split('-').map(Number);
  const wd=['일','월','화','수','목','금','토'][new Date(Date.UTC(y,m-1,da)).getUTCDay()];
  return `${y}.${String(m).padStart(2,'0')}.${String(da).padStart(2,'0')} (${wd})`;
}
function showMsg(t){ $('#frame').classList.add('hidden'); const m=$('#msg'); m.textContent=t; m.classList.remove('hidden'); }
async function render(){
  const date=DATES[idx];
  $('#date').textContent=fmtDate(date);
  $('#count').textContent=`${idx+1} / ${DATES.length}`;
  $('#prev').disabled=idx<=0; $('#next').disabled=idx>=DATES.length-1;
  history.replaceState(null,'','#'+date);
  const f=$('#frame');
  try{
    const html=await loadDay(date);
    f.srcdoc=html; f.classList.remove('hidden'); $('#msg').classList.add('hidden');
    f.onload=()=>{ try{ f.contentWindow.addEventListener('keydown',keyNav); }catch(e){} };
  }catch(e){ showMsg('이 날짜를 불러오지 못했습니다.'); }
}
function go(delta){ const n=idx+delta; if(n>=0&&n<DATES.length){ idx=n; render(); } }
function keyNav(e){ if(e.key==='ArrowLeft')go(-1); else if(e.key==='ArrowRight')go(1); }

$('#prev').onclick=()=>go(-1);
$('#next').onclick=()=>go(1);
window.addEventListener('keydown',keyNav);
let tx=0; addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>60)go(dx>0?-1:1);},{passive:true});

(async function init(){
  try{
    const man=await (await fetch('manifest.json',{cache:'no-cache'})).json();
    DATES=(man.dates||[]).slice().sort();
  }catch(e){ showMsg('목록을 불러오지 못했습니다.'); return; }
  if(!DATES.length){ showMsg('아직 게시된 브리핑이 없습니다.'); return; }
  idx=DATES.length-1;
  const h=location.hash.replace('#','');
  if(DATES.includes(h)) idx=DATES.indexOf(h);
  render();
})();
</script>
</body>
</html>
